<style>html,body{margin:0;padding:0;height:100%;background:#fff;overflow:hidden}body{display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background-color .6s ease;isolation:isolate}#bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;transition:opacity .6s ease}#ov{position:fixed;top:50%;left:22%;height:100vh;width:auto;transform:translate(-50%,-50%);mix-blend-mode:darken;opacity:.05;pointer-events:none;z-index:-1;transition:opacity .6s ease}#q{border:1px solid #ccc;padding:8px 10px;font-size:16px;width:220px;text-align:center;outline:none;transition:opacity .3s ease;background:rgba(255,255,255,.85)}#q:focus{border-color:#999}#q.p{opacity:.4}#m{position:fixed;bottom:40%;font-size:13px;color:#999;font-family:sans-serif;opacity:0;transition:opacity .4s ease;text-shadow:0 0 6px #fff}

<script>
(function(){

var q=document.getElementById('q'),m=document.getElementById('m'),bg=document.getElementById('bg'),ov=document.getElementById('ov'),t=null;
function s(x){m.textContent=x;m.style.opacity='1';clearTimeout(t);t=setTimeout(function(){m.style.opacity='0'},2500)}

var PHRASE='DIGITALARCHIVEOFMOMENTSANDIMPRESSIONS',CS='ABCDEFGHIJKLMNOPQRSTUVWXYZ.',SPIN=75000;
function art(){
var c3=document.querySelector('.c3'),ring=document.getElementById('ring'),sp=[],i;
function drive(el){
var k=CS.indexOf(el.textContent),n=0;
if(k<0)k=0;
function go(){
if(n>0){
n--;k=(k+1)%CS.length;el.textContent=CS.charAt(k);
if(el.animate)el.animate([{transform:'perspective(60px) rotateX(-58deg)',opacity:.3},{transform:'none',opacity:1}],{duration:260,easing:'ease-out'});
setTimeout(go,240+Math.random()*280);
}else{
n=1+Math.floor(Math.random()*3);setTimeout(go,4000+Math.random()*12000);
}
}
setTimeout(go,Math.random()*8000);
}
for(i=0;i<PHRASE.length;i++){var e=document.createElement('span'),g=document.createElement('i');g.textContent=PHRASE.charAt(i);e.appendChild(g);ring.appendChild(e);sp.push(e);drive(g)}
var P=[],L=[],TOT=0;
function build(){
var W=c3.clientWidth,H=c3.clientHeight;
c3.style.fontSize=(H*0.039)+'px';
var a=W*0.1766,b=H*0.1673,r=Math.min(W*0.0599,a,b),j,g;
P=[];
function arc(cx,cy,a0,a1){for(var i=1;i<=12;i++){g=a0+(a1-a0)*i/12;P.push([cx+r*Math.cos(g),cy+r*Math.sin(g)])}}
P.push([0,-b]);P.push([a-r,-b]);arc(a-r,-b+r,-Math.PI/2,0);
P.push([a,b-r]);arc(a-r,b-r,0,Math.PI/2);
P.push([-a+r,b]);arc(-a+r,b-r,Math.PI/2,Math.PI);
P.push([-a,-b+r]);arc(-a+r,-b+r,Math.PI,1.5*Math.PI);
P.push([0,-b]);
L=[0];TOT=0;
for(j=1;j<P.length;j++){TOT+=Math.sqrt(Math.pow(P[j][0]-P[j-1][0],2)+Math.pow(P[j][1]-P[j-1][1],2));L.push(TOT)}
}
function place(el,d){
d=((d%TOT)+TOT)%TOT;
var lo=1,hi=L.length-1,mid;
while(lo<hi){mid=(lo+hi)>>1;if(L[mid]<d)lo=mid+1;else hi=mid}
var p0=P[lo-1],p1=P[lo],seg=L[lo]-L[lo-1],f=seg>0?(d-L[lo-1])/seg:0;
var x=p0[0]+(p1[0]-p0[0])*f,y=p0[1]+(p1[1]-p0[1])*f,r=Math.atan2(p1[1]-p0[1],p1[0]-p0[0]);
el.style.transform='translate('+x.toFixed(2)+'px,'+y.toFixed(2)+'px) rotate('+r.toFixed(4)+'rad) translate(-50%,-50%)';
}
var t0=null;
function frame(ts){
if(t0===null)t0=ts;
var ph=((ts-t0)%SPIN)/SPIN*TOT,j;
for(j=0;j<sp.length;j++)place(sp[j],ph+j/sp.length*TOT);
requestAnimationFrame(frame);
}
build();window.addEventListener('resize',build);requestAnimationFrame(frame);
}
function unlock(){
document.documentElement.style.backgroundColor='#02539F';document.body.style.backgroundColor='#02539F';
q.style.display='none';bg.style.opacity='0';ov.style.opacity='0';
document.getElementById('art').classList.add('on');
art();
setTimeout(function(){try{bg.pause()}catch(e){}bg.style.display='none';ov.style.display='none'},1000);
}

q.addEventListener('keydown',function(e){
if(e.key!=='Enter')return;
var v=q.value;q.value='';q.blur();q.classList.add('p');
fetch(u,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({input:v})})
.then(function(r){return r.json()})
.then(function(d){
q.classList.remove('p');
if(d.result==='success'){unlock()}
else{s('—')}
})
.catch(function(){q.classList.remove('p');s('—')});
});
})();
