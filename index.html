<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fff;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background-color 0.6s ease;
  }
  #label {
    font-family: sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #999;
    margin-bottom: 10px;
  }
  input {
    border: 1px solid #ccc;
    padding: 8px 10px;
    font-size: 16px;
    width: 220px;
    text-align: center;
    outline: none;
    transition: opacity 0.3s ease;
  }
  input:focus {
    border-color: #999;
  }
  input.pending {
    opacity: 0.4;
  }
  #msg {
    position: fixed;
    bottom: 40%;
    font-size: 13px;
    color: #999;
    font-family: sans-serif;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
</style>
</head>
<body>
  <div id="label">PASSWORD</div>
  <input id="field" type="text" autocomplete="off" spellcheck="false">
  <div id="msg"></div>

<script>
  var BACKEND_URL = "https://script.google.com/macros/s/AKfycbxqF0UzABUMC5Uaao0V2KeskpHlZoUnnxrpbFObPgwpsKY4DNtzZi-mT6UFK_4EZRM9/exec";

  var field = document.getElementById('field');
  var msg = document.getElementById('msg');
  var msgTimer = null;

  function showMsg(text) {
    msg.textContent = text;
    msg.style.opacity = '1';
    clearTimeout(msgTimer);
    msgTimer = setTimeout(function () {
      msg.style.opacity = '0';
    }, 2500);
  }

  field.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var value = field.value;
    field.value = '';
    field.blur();
    field.classList.add('pending');

    fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ input: value })
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        field.classList.remove('pending');
        if (data.result === 'success') {
          document.body.style.backgroundColor = '#1a4fd6';
          field.style.display = 'none';
          document.getElementById('label').style.display = 'none';
        } else {
          showMsg('—');
        }
      })
      .catch(function () {
        field.classList.remove('pending');
        showMsg('—');
      });
  });
</script>
</body>
</html>
